<!DOCTYPE html>
<html>
<head>
    <title>Process Tree</title>
    <style>
        .step { display: none; padding: 20px; border: 1px solid #ccc; margin: 10px; border-radius: 8px; max-width: 600px; }
        .visible { display: block; }
        button { margin: 5px; padding: 10px 20px; cursor: pointer; display: block; width: 100%; text-align: left; }
    </style>
</head>
<body>

    <div id="tree-container"></div>

    <script>
        const steps = {
            "step1": {
                text: "Is this incident a PSE, Collision or both?",
                options: [
                    { label: "PSE", next: "pse_investigate" },
                    { label: "Collision", next: "step3" },
                    { label: "Both", next: "step4" }
                ]
            },
            // --- PSE Investigation ---
            "pse_investigate": {
                text: "1) Use the WebRAD Panorama Camera Replay and recordings in Webviz to investigate the event. Is the event a true or false positive?",
                options: [
                    { label: "True Positive", next: "pse_severity" },
                    { label: "False Positive", next: "pse_false_positive" }
                ]
            },
            "pse_false_positive": {
                text: "Event confirmed as False Positive. No further action required.",
                options: [{ label: "Return to Start", next: "step1" }]
            },
            // --- Severity/Urgency ---
            "pse_severity": {
                text: "Determine the severity of the event. Is this an urgent PSE?",
                options: [
                    { label: "Yes", next: "pse_urgent_steps" },
                    { label: "No", next: "pse_safety_deescalation" }
                ]
            },
            "pse_urgent_steps": {
                text: "URGENT PSE ESCALATION: 1) Find EM on shift via go/emschedule. 2) Ping in Escalation to EM space.",
                options: [{ label: "Continue", next: "pse_safety_deescalation" }]
            },
            // --- Safety and De-escalation ---
            "pse_safety_deescalation": {
                text: "SAFETY & DE-ESCALATION: Talk to rider to ensure safety/comfort. Try to de-escalate using audio alerts, and attempt to escape using unsticking tools.",
                options: [{ label: "Next", next: "pse_es_required" }]
            },
            // --- Emergency Services Gate ---
            "pse_es_required": {
                text: "Are Emergency Services (ES) required? (Injuries, active threat, medical emergency, or severe verbal threat?)",
                options: [
                    { label: "Yes", next: "pse_es_process" },
                    { label: "No", next: "pse_evaluate" }
                ]
            },
            "pse_es_process": {
                text: "EMERGENCY SERVICES CALL PROTOCOL:<br><br>1) Call emergency services and quote Police (or Ambulance for medical).<br>2) Introduce yourself and state you are calling about an autonomous vehicle incident.<br>3) Explain the situation and your request.<br>4) Provide your callback number, then ask for an incident number and ETA.",
                options: [{ label: "Continue", next: "pse_evaluate" }]
            },
            // --- Evaluation Phase ---
            "pse_evaluate": {
                text: "Once the threat is no longer active, please respond to the EVALUATE PSE request:",
                options: [
                    { label: "1) Yes there is blocking damage, dispatch recovery immediately", next: "pse_post_evaluation" },
                    { label: "2) Yes there is blocking damage, complete trip and RTB", next: "pse_post_evaluation" },
                    { label: "3) Yes, but no blocking damage", next: "pse_post_evaluation" },
                    { label: "4) No, there is no damage", next: "pse_post_evaluation" },
                    { label: "5) No, there is no damage but there was a PSE", next: "pse_post_evaluation" }
                ]
            },
            "pse_post_evaluation": {
                text: "Evaluation noted. Proceeding to final steps...",
                options: [{ label: "Continue", next: "step1" }]
            },
            // --- Placeholders ---
            "step3": { text: "Collision path logic goes here.", options: [{ label: "Back", next: "step1" }] },
            "step4": { text: "Both path logic goes here.", options: [{ label: "Back", next: "step1" }] }
        };

        function renderStep(id) {
            const container = document.getElementById('tree-container');
            container.innerHTML = ''; 
            
            const step = steps[id];
            const div = document.createElement('div');
            div.className = 'step visible';
            div.innerHTML = `<h3>${step.text}</h3>`;
            
            step.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt.label;
                btn.onclick = () => renderStep(opt.next);
                div.appendChild(btn);
            });
            
            container.appendChild(div);
        }

        renderStep('step1');
    </script>
</body>
</html>

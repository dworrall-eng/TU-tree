<!DOCTYPE html>
<html>
<head>
    <title>Process Tree</title>
    <style>
        .step { display: none; padding: 20px; border: 1px solid #ccc; margin: 10px; border-radius: 8px; max-width: 600px; }
        .visible { display: block; }
        button { margin: 5px; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="tree-container"></div>

    <script>
        // This is your data. Add as many steps as you want here!
        const steps = {
            "step1": {
                text: "Is this incident a PSE, Collision or both?",
                options: [
                    { label: "PSE", next: "pse_investigate" },
                    { label: "Collision", next: "step3" },
                    { label: "Both", next: "step4" }
                ]
            },
            // --- PSE Investigation Phase ---
            "pse_investigate": {
                text: "1) Use the WebRAD Panorama Camera Replay and recordings in Webviz to investigate the event. Is the event a true or false positive?",
                options: [
                    { label: "True Positive", next: "pse_true_positive" },
                    { label: "False Positive", next: "pse_false_positive" }
                ]
            },
            "pse_false_positive": {
                text: "Event confirmed as False Positive. No further action required.",
                options: [{ label: "Return to Start", next: "step1" }]
            },
            "pse_true_positive": {
                text: "True Positive confirmed. Proceeding to next investigation phase...",
                options: [{ label: "Continue", next: "pse_next_step" }] 
            },
            "pse_next_step": { 
                text: "What is the next process step?", 
                options: [{ label: "Back to Start", next: "step1" }] 
            },
            // --- Placeholders ---
            "step3": { 
                text: "Collision path logic goes here.", 
                options: [{ label: "Back", next: "step1" }] 
            },
            "step4": { 
                text: "Both path logic goes here.", 
                options: [{ label: "Back", next: "step1" }] 
            }
        };

        function renderStep(id) {
            const container = document.getElementById('tree-container');
            container.innerHTML = ''; // Clear previous
            
            const step = steps[id];
            const div = document.createElement('div');
            div.className = 'step visible';
            div.innerHTML = `<h3>${step.text}</h3>`;
            
            step.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt.label;
                btn.onclick = () => renderStep(opt.next);
                div.appendChild(btn);
            });
            
            container.appendChild(div);
        }

        // Initialize the tree
        renderStep('step1');
    </script>
</body>
</html>

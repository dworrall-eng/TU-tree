<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Incident Management - Part 1</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 40px 20px; }
        #tree-container { width: 100%; max-width: 650px; }
        .step { background: var(--card); padding: 32px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        button { display: block; width: 100%; padding: 14px; margin-bottom: 10px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div id="tree-container"></div>
    <script>
        const steps = {
            "step1": {
                text: "Select the incident type to begin:",
                options: [
                    { label: "PSE Incident", next: "pse_investigate" },
                    { label: "Collision", next: "step3" }
                ]
            },
            "pse_investigate": {
                text: "1) Use Webviz to investigate. Is the event a true or false positive?",
                options: [
                    { label: "True Positive", next: "pse_severity" },
                    { label: "False Positive", next: "pse_false_positive" }
                ]
            },
            "pse_false_positive": {
                text: "False Positive. No further action.",
                options: [{ label: "Restart", next: "step1" }]
            },
            "pse_severity": {
                text: "Is this an urgent PSE?",
                options: [
                    { label: "Yes", next: "pse_urgent_steps" },
                    { label: "No", next: "pse_safety_deescalation" }
                ]
            },
            "pse_urgent_steps": {
                text: "URGENT ESCALATION: 1) Find EM via go/emschedule. 2) Ping Escalation to EM space.",
                options: [{ label: "Continue", next: "pse_safety_deescalation" }]
            },
            "pse_safety_deescalation": {
                text: "SAFETY: Ensure rider safety. De-escalate via audio/unsticking tools.",
                options: [{ label: "Next", next: "pse_es_required" }]
            },
            "pse_es_required": {
                text: "Are Emergency Services required?",
                options: [
                    { label: "Yes", next: "pse_es_process" },
                    { label: "No", next: "step_placeholder" }
                ]
            },
            "pse_es_process": {
                text: "ES PROTOCOL: Call ES, quote Police/Amb, introduce self, explain, get incident #.",
                options: [{ label: "Continue", next: "step_placeholder" }]
            },
            "step_placeholder": { text: "Work in progress (Part 2 pending).", options: [{ label: "Restart", next: "step1" }] },
            "step3": { text: "Collision path logic...", options: [{ label: "Restart", next: "step1" }] }
        };

        function renderStep(id) {
            const container = document.getElementById('tree-container');
            container.innerHTML = ''; 
            const step = steps[id];
            const div = document.createElement('div');
            div.className = 'step';
            div.innerHTML = `<h3>${step.text}</h3>`;
            step.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt.label;
                btn.onclick = () => renderStep(opt.next);
                div.appendChild(btn);
            });
            container.appendChild(div);
        }
        renderStep('step1');
    </script>
</body>
</html>

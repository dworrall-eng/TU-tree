<!DOCTYPE html>
<html>
<head>
    <title>Process Tree</title>
    <style>
        .step { display: none; padding: 20px; border: 1px solid #ccc; margin: 10px; border-radius: 8px; }
        .visible { display: block; }
        button { margin-right: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="tree-container"></div>

    <script>
        // This is your data. Add as many steps as you want here!
        const steps = {
            "step1": {
                text: "Is this incident a PSE, Collision or both?",
                options: [
                    { label: "PSE", next: "step2" },
                    { label: "Collision", next: "step3" },
                    { label: "Both", next: "step4" }
                ]
            },
            "step2": { text: "You chose PSE", options: [{ label: "Start Over", next: "step1" }] },
            "step3": { text: "You chose Collision", options: [{ label: "Start Over", next: "step1" }] },
            "step4": { text: "You chose both", options: [{ label: "Start Over", next: "step1" }] }
        };

        function renderStep(id) {
            const container = document.getElementById('tree-container');
            container.innerHTML = ''; // Clear previous
            
            const step = steps[id];
            const div = document.createElement('div');
            div.className = 'step visible';
            div.innerHTML = `<h3>${step.text}</h3>`;
            
            step.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt.label;
                btn.onclick = () => renderStep(opt.next);
                div.appendChild(btn);
            });
            
            container.appendChild(div);
        }

        renderStep('step1');
    </script>
</body>
</html>

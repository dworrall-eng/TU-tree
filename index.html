<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Incident Management Portal</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 40px 20px; }
        #tree-container { width: 100%; max-width: 650px; }
        .step { background: var(--card); padding: 32px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; font-size: 1.25rem; line-height: 1.6; }
        button { display: block; width: 100%; padding: 14px; margin-bottom: 10px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div id="tree-container"></div>
    <script src="data.js"></script>
    <script>
        function renderStep(id) {
            const container = document.getElementById('tree-container');
            const step = steps[id];
            if (!step) return;
            
            container.innerHTML = `<div class="step"><h3>${step.text}</h3><div id="btn-container"></div></div>`;
            const btnContainer = document.getElementById('btn-container');
            
            step.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt.label;
                btn.onclick = () => renderStep(opt.next);
                btnContainer.appendChild(btn);
            });
        }
        // Small delay to ensure data.js is fully parsed
        window.onload = () => renderStep('step1');
    </script>
</body>
</html>
